services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: arr_sync_qbittorrent_dev
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - qbittorrent_config:/config
      - /tmp/arr_sync_media_test:/data/media

volumes:
  qbittorrent_config:
